# SMS Gateway configuration
# See config.go for all available options

# Database
DB_DRIVER=sqlite
DB_DSN=/opt/sms-gateway/sms-gateway.db

# GSM modem serial device
DEVICE_PATH=/dev/ttyUSB2
BAUD_RATE=115200

# HTTP server port
PORT=5174

# JWT secret (change this!)
JWT_SECRET=change-me-in-production
